<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Productos Admin — Sport Plus</title>
  <link rel="stylesheet" href="../../css/main.css" />
  <style>
    body { background: var(--bg); }
    .admin-layout { display: flex; min-height: 100vh; padding-top: 72px; }
    .admin-sidebar {
      width: 240px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border);
      position: fixed; top: 72px; left: 0; bottom: 0;
      display: flex; flex-direction: column; padding: 2rem 0; z-index: 100;
    }
    .sidebar-label {
      font-family: var(--font-display); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted-2);
      padding: 0 1.5rem; margin-bottom: 0.5rem; margin-top: 1.5rem;
    }
    .sidebar-label:first-child { margin-top: 0; }
    .sidebar-link {
      display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1.5rem;
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);
      transition: all var(--transition); border-left: 3px solid transparent;
      text-decoration: none; cursor: pointer;
    }
    .sidebar-link:hover { color: var(--white); background: var(--surface-2); }
    .sidebar-link.active { color: var(--white); border-left-color: var(--accent); background: var(--surface-2); }
    .sidebar-link .icon { font-size: 1.1rem; width: 20px; text-align: center; }
    .sidebar-bottom { margin-top: auto; padding: 1rem 0; border-top: 1px solid var(--border); }
    .admin-main { margin-left: 240px; flex: 1; padding: 2.5rem; }

    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; gap: 1rem; flex-wrap: wrap; }
    .page-title { font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3rem); font-weight: 900; text-transform: uppercase; color: var(--white); line-height: 1; }
    .page-subtitle { font-size: 0.9rem; color: var(--muted); margin-top: 0.3rem; }

    /* TOOLBAR */
    .toolbar { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-box {
      display: flex; align-items: center;
      background: var(--surface); border: 1px solid var(--border-light);
      border-radius: var(--radius-sm); overflow: hidden; flex: 1; max-width: 320px;
    }
    .search-box input {
      background: transparent; border: none; outline: none;
      padding: 0.65rem 1rem; font-family: var(--font-body); font-size: 0.9rem;
      color: var(--text); width: 100%;
    }
    .search-box input::placeholder { color: var(--muted-2); }

    /* TABLA */
    .admin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .admin-table { width: 100%; border-collapse: collapse; }
    .admin-table th {
      font-family: var(--font-display); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted);
      padding: 0.75rem 1.5rem; text-align: left; border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .admin-table td { padding: 1rem 1.5rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--surface-2); }

    .prod-img {
      width: 48px; height: 48px; border-radius: var(--radius-sm);
      object-fit: cover; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .prod-img img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-sm); }

    .stock-badge {
      font-family: var(--font-display); font-size: 0.75rem; font-weight: 700;
      padding: 0.2rem 0.6rem; border-radius: 100px;
    }
    .stock-ok  { background: rgba(68,255,136,0.1); color: #44ff88; }
    .stock-low { background: rgba(255,193,7,0.15); color: #ffc107; }
    .stock-out { background: rgba(255,61,0,0.15);  color: var(--accent); }

    .action-btns { display: flex; gap: 0.5rem; }
    .btn-icon {
      background: transparent; border: 1px solid var(--border-light);
      color: var(--muted); padding: 0.4rem 0.7rem; border-radius: var(--radius-sm);
      cursor: pointer; font-size: 0.85rem; transition: all var(--transition);
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--accent); color: var(--accent); }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      display: none; align-items: center; justify-content: center;
      z-index: 500; backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2rem; width: 100%;
      max-width: 560px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .modal-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; text-transform: uppercase; color: var(--white); }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; transition: color var(--transition); }
    .modal-close:hover { color: var(--white); }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .modal-grid .full { grid-column: 1 / -1; }
    .modal-footer { display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: flex-end; }

    .loading-row td { color: var(--muted); text-align: center; padding: 3rem; }

    @media (max-width: 768px) {
      .admin-sidebar { display: none; }
      .admin-main { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="../../index.html" class="navbar-logo">
    Sport<span>+</span>
    <span style="font-size:0.65rem;color:var(--muted);margin-left:0.75rem;font-family:var(--font-body);font-weight:400;letter-spacing:0.2em;">ADMIN</span>
  </a>
  <div class="navbar-actions">
    <span id="admin-nombre" style="font-size:0.85rem;color:var(--muted);margin-right:0.5rem;"></span>
    <button class="btn btn-ghost" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <span class="sidebar-label">Panel</span>
    <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> Dashboard</a>
    <span class="sidebar-label">Gestión</span>
    <a href="productos.html" class="sidebar-link active"><span class="icon">👟</span> Productos</a>
    <a href="pedidos.html" class="sidebar-link"><span class="icon">📦</span> Pedidos</a>
    <a href="usuarios.html" class="sidebar-link"><span class="icon">👥</span> Usuarios</a>
    <div class="sidebar-bottom">
      <a href="../../index.html" class="sidebar-link"><span class="icon">🏠</span> Ver tienda</a>
      <a href="#" class="sidebar-link" onclick="cerrarSesion()"><span class="icon">🚪</span> Salir</a>
    </div>
  </aside>

  <main class="admin-main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Productos</h1>
        <p class="page-subtitle" id="num-productos">Cargando…</p>
      </div>
      <button class="btn btn-primary" onclick="abrirModalNuevo()">+ Nuevo producto</button>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <input type="text" id="buscador" placeholder="🔍 Buscar producto…" oninput="filtrarTabla()">
      </div>
    </div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Img</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Categoría</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tabla-productos">
          <tr class="loading-row"><td colspan="6">⏳ Cargando productos…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- MODAL CREAR / EDITAR -->
<div class="modal-overlay" id="modal-producto">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-titulo">Nuevo Producto</span>
      <button class="modal-close" onclick="cerrarModal()">×</button>
    </div>
    <div class="modal-grid">
      <div class="form-group full">
        <label class="form-label">Nombre *</label>
        <input class="form-input" type="text" id="inp-nombre" placeholder="Nombre del producto">
      </div>
      <div class="form-group">
        <label class="form-label">Precio (€) *</label>
        <input class="form-input" type="number" id="inp-precio" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Stock *</label>
        <input class="form-input" type="number" id="inp-stock" placeholder="0" min="0">
      </div>
      <div class="form-group full">
        <label class="form-label">Categoría</label>
        <select class="form-input" id="inp-categoria">
          <option value="">Sin categoría</option>
        </select>
      </div>
      <div class="form-group full">
        <label class="form-label">Descripción</label>
        <input class="form-input" type="text" id="inp-descripcion" placeholder="Descripción del producto">
      </div>
      <div class="form-group full">
        <label class="form-label">URL Imagen</label>
        <input class="form-input" type="text" id="inp-imagen" placeholder="https://...">
      </div>
    </div>
    <div id="modal-msg" class="msg" style="margin-top:1rem;"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar" onclick="guardarProducto()">Guardar</button>
    </div>
  </div>
</div>

<script src="../../js/config.js"></script>
<script src="../../js/utils.js"></script>
<script src="../../js/auth.js"></script>
<script>
  if (!localStorage.getItem('token') || localStorage.getItem('rol') !== 'ADMIN') {
    window.location.href = '../../index.html';
  }

  const nombre = localStorage.getItem('nombre');
  if (nombre) document.getElementById('admin-nombre').textContent = nombre;

  const HEADERS = {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${localStorage.getItem('token')}`
  };

  let todosProductos = [];
  let editandoId = null;

  // ——— CARGAR PRODUCTOS ———
  async function cargarProductos() {
    try {
      const res = await fetch(`${API_BASE_URL}/productos`, { headers: HEADERS });
      const data = await res.json();
      todosProductos = Array.isArray(data) ? data : data.productos || [];
      document.getElementById('num-productos').textContent = `${todosProductos.length} productos en catálogo`;
      renderTabla(todosProductos);
    } catch (err) {
      console.error(err);
      document.getElementById('tabla-productos').innerHTML =
        '<tr class="loading-row"><td colspan="6">⚠ Error al cargar productos</td></tr>';
    }
  }

  // ——— CARGAR CATEGORÍAS PARA EL SELECTOR ———
  async function cargarCategorias() {
    try {
      const res = await fetch(`${API_BASE_URL}/categorias`, { headers: HEADERS });
      const data = await res.json();
      const lista = Array.isArray(data) ? data : data.categorias || [];
      const select = document.getElementById('inp-categoria');
      lista.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = c.nombre;
        select.appendChild(opt);
      });
    } catch (err) { console.error(err); }
  }

  // ——— RENDERIZAR TABLA ———
  function renderTabla(productos) {
    if (productos.length === 0) {
      document.getElementById('tabla-productos').innerHTML =
        '<tr class="loading-row"><td colspan="6">No hay productos</td></tr>';
      return;
    }
    document.getElementById('tabla-productos').innerHTML = productos.map(p => {
      const stock = parseInt(p.stock) || 0;
      const stockClass = stock === 0 ? 'stock-out' : stock < 5 ? 'stock-low' : 'stock-ok';
      const stockLabel = stock === 0 ? 'Sin stock' : stock < 5 ? `⚠ ${stock}` : stock;
      return `
        <tr>
          <td>
            <div class="prod-img">
              ${p.imagen ? `<img src="${p.imagen}" alt="${p.nombre}">` : '👟'}
            </div>
          </td>
          <td><strong>${p.nombre}</strong><br><span style="color:var(--muted);font-size:0.8rem;">${p.descripcion ? p.descripcion.substring(0,40)+'...' : ''}</span></td>
          <td><strong>${parseFloat(p.precio || 0).toFixed(2)}€</strong></td>
          <td><span class="stock-badge ${stockClass}">${stockLabel}</span></td>
          <td>${p.categoria || p.categoria_id || '—'}</td>
          <td>
            <div class="action-btns">
              <button class="btn-icon" onclick="abrirModalEditar(${p.id})" title="Editar">✏️</button>
              <button class="btn-icon danger" onclick="eliminarProducto(${p.id}, '${p.nombre}')" title="Eliminar">🗑️</button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  // ——— FILTRAR ———
  function filtrarTabla() {
    const q = document.getElementById('buscador').value.toLowerCase();
    const filtrados = todosProductos.filter(p =>
      p.nombre.toLowerCase().includes(q) || (p.descripcion || '').toLowerCase().includes(q)
    );
    renderTabla(filtrados);
  }

  // ——— MODAL NUEVO ———
  function abrirModalNuevo() {
    editandoId = null;
    document.getElementById('modal-titulo').textContent = 'Nuevo Producto';
    document.getElementById('btn-guardar').textContent = 'Crear';
    ['nombre','precio','stock','descripcion','imagen'].forEach(f =>
      document.getElementById(`inp-${f}`).value = ''
    );
    document.getElementById('inp-categoria').value = '';
    document.getElementById('modal-msg').style.display = 'none';
    document.getElementById('modal-producto').classList.add('open');
  }

  // ——— MODAL EDITAR ———
  function abrirModalEditar(id) {
    const p = todosProductos.find(x => x.id === id);
    if (!p) return;
    editandoId = id;
    document.getElementById('modal-titulo').textContent = 'Editar Producto';
    document.getElementById('btn-guardar').textContent = 'Guardar cambios';
    document.getElementById('inp-nombre').value = p.nombre || '';
    document.getElementById('inp-precio').value = p.precio || '';
    document.getElementById('inp-stock').value = p.stock || '';
    document.getElementById('inp-descripcion').value = p.descripcion || '';
    document.getElementById('inp-imagen').value = p.imagen || '';
    document.getElementById('inp-categoria').value = p.categoria_id || '';
    document.getElementById('modal-msg').style.display = 'none';
    document.getElementById('modal-producto').classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modal-producto').classList.remove('open');
    editandoId = null;
  }

  // ——— GUARDAR (crear o editar) ———
  async function guardarProducto() {
    const nombre   = document.getElementById('inp-nombre').value.trim();
    const precio   = document.getElementById('inp-precio').value;
    const stock    = document.getElementById('inp-stock').value;
    const catId    = document.getElementById('inp-categoria').value;
    const desc     = document.getElementById('inp-descripcion').value.trim();
    const imagen   = document.getElementById('inp-imagen').value.trim();
    const msgEl    = document.getElementById('modal-msg');

    if (!nombre || !precio || !stock) {
      msgEl.textContent = 'Nombre, precio y stock son obligatorios.';
      msgEl.className = 'msg msg-error';
      msgEl.style.display = 'block';
      return;
    }

    const body = {
      nombre, precio: parseFloat(precio), stock: parseInt(stock),
      descripcion: desc, imagen,
      ...(catId && { categoria_id: parseInt(catId) })
    };

    try {
      const url    = editandoId ? `${API_BASE_URL}/productos/${editandoId}` : `${API_BASE_URL}/productos`;
      const method = editandoId ? 'PUT' : 'POST';
      const res    = await fetch(url, { method, headers: HEADERS, body: JSON.stringify(body) });

      if (res.ok) {
        cerrarModal();
        cargarProductos();
      } else {
        const err = await res.json();
        msgEl.textContent = err.error || 'Error al guardar.';
        msgEl.className = 'msg msg-error';
        msgEl.style.display = 'block';
      }
    } catch (err) {
      msgEl.textContent = 'Error de conexión.';
      msgEl.className = 'msg msg-error';
      msgEl.style.display = 'block';
    }
  }

  // ——— ELIMINAR ———
  async function eliminarProducto(id, nombre) {
    if (!confirm(`¿Eliminar "${nombre}"? Esta acción no se puede deshacer.`)) return;
    try {
      const res = await fetch(`${API_BASE_URL}/productos/${id}`, { method: 'DELETE', headers: HEADERS });
      if (res.ok) {
        cargarProductos();
      } else {
        alert('Error al eliminar el producto.');
      }
    } catch (err) {
      alert('Error de conexión.');
    }
  }

  function cerrarSesion() { localStorage.clear(); window.location.href = '../../index.html'; }

  // Cerrar modal al hacer click fuera
  document.getElementById('modal-producto').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  cargarProductos();
  cargarCategorias();
</script>
</body>
</html>
