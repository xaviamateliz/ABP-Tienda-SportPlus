<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito — Sport Plus</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    body { padding-top: 72px; background: var(--bg); }

    /* ——— CABECERA ——— */
    .cart-header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    .cart-header h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 0.5rem;
    }

    .cart-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ——— LAYOUT PRINCIPAL ——— */
    /* Dos columnas: productos a la izquierda, resumen a la derecha */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2.5rem;
      padding: 3rem 0 5rem;
      align-items: start;
    }

    /* ——— LISTA DE PRODUCTOS ——— */
    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* Cada producto individual */
    .cart-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 1.5rem;
      align-items: center;
      transition: border-color var(--transition);
    }

    .cart-item:hover { border-color: var(--border-light); }

    /* Imagen del producto */
    .cart-item-img {
      width: 100px;
      height: 120px;
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Información del producto */
    .cart-item-info {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .cart-item-sport {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cart-item-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 0.2rem;
    }

    .cart-item-talla {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .cart-item-talla strong {
      color: var(--text);
      font-weight: 600;
    }

    .cart-item-price {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      margin-top: 0.5rem;
    }

    /* Controles de cantidad y eliminar */
    .cart-item-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
    }

    /* Selector de cantidad */
    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0.3rem;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .quantity-btn:hover {
      background: var(--surface);
      color: var(--white);
    }

    .quantity-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .quantity-value {
      min-width: 32px;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
    }

    /* Botón eliminar */
    .btn-remove {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-remove:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ——— RESUMEN / CHECKOUT ——— */
    .cart-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      position: sticky;
      top: 90px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .summary-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--white);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    /* Líneas del resumen */
    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .summary-line span:last-child {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    .summary-total-label {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--white);
    }

    .summary-total-price {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--white);
    }

    .btn-checkout {
      width: 100%;
      justify-content: center;
      padding: 1rem;
      font-size: 1rem;
    }

    .summary-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ——— CARRITO VACÍO ——— */
    .cart-empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1.5rem;
      text-align: center;
    }

    .cart-empty-icon {
      font-size: 5rem;
      opacity: 0.5;
    }

    .cart-empty h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 0.5rem;
    }

    .cart-empty p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 400px;
    }

    /* ——— RESPONSIVE ——— */
    @media (max-width: 1000px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }

      .cart-item {
        grid-template-columns: 80px 1fr;
        gap: 1rem;
      }

      .cart-item-controls {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">Sport<span>+</span></a>
    <ul class="navbar-links">
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="catalogo.html?deporte=futbol">Fútbol</a></li>
      <li><a href="catalogo.html?deporte=running">Running</a></li>
      <li><a href="catalogo.html?deporte=gym">Gym</a></li>
      <li><a href="catalogo.html?deporte=baloncesto">Baloncesto</a></li>
    </ul>
    <div class="navbar-actions">
      <div id="nav-user"></div>
      <a href="carrito.html" class="navbar-icon-btn">
        🛒 <span>Carrito</span>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <!-- ============ CABECERA ============ -->
  <div class="cart-header">
    <div class="container">
      <h1>Carrito</h1>
      <p id="items-count">0 productos</p>
    </div>
  </div>

  <!-- ============ CONTENIDO PRINCIPAL ============ -->
  <div class="container">
    <div class="cart-layout" id="cart-content">
      
      <!-- Este contenido se genera dinámicamente con JavaScript -->
      
    </div>
  </div>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;text-transform:uppercase;">
          Sport<span style="color:var(--accent)">+</span>
        </span>
        <p>© 2026 Sport Plus · Proyecto ABP 1DAM/1DAW</p>
      </div>
    </div>
  </footer>

  <!-- ============ SCRIPTS ============ -->
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/productos.js"></script>

  <script>
    // ─────────────────────────────────────────────
    // VARIABLE GLOBAL: carrito actual
    // Se carga desde localStorage al iniciar la página
    // ─────────────────────────────────────────────
    let carrito = [];

    // ─────────────────────────────────────────────
    // AL CARGAR LA PÁGINA
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", function() {
      
      // Iniciar navbar
      if (typeof iniciarNavbar === "function") {
        iniciarNavbar();
      }

      // Cargar carrito desde localStorage
      cargarCarrito();

      // Renderizar la página
      renderizarCarrito();
    });

    // ─────────────────────────────────────────────
    // FUNCIÓN: cargarCarrito
    // Lee el carrito guardado en localStorage
    // ─────────────────────────────────────────────
    function cargarCarrito() {
      // Leemos el carrito del localStorage
      // Si no existe, devuelve un array vacío
      const carritoGuardado = localStorage.getItem("carrito");
      
      if (carritoGuardado) {
        // JSON.parse convierte el texto guardado a un array de JS
        carrito = JSON.parse(carritoGuardado);
      } else {
        carrito = [];
      }
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: guardarCarrito
    // Guarda el carrito en localStorage después de cualquier cambio
    // ─────────────────────────────────────────────
    function guardarCarrito() {
      // JSON.stringify convierte el array a texto para guardarlo
      localStorage.setItem("carrito", JSON.stringify(carrito));
      
      // Actualizar el contador de la navbar
      actualizarContadorCarrito();
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: renderizarCarrito
    // Dibuja toda la página según el estado del carrito
    // ─────────────────────────────────────────────
    function renderizarCarrito() {
      const contenedor = document.getElementById("cart-content");

      // Actualizar contador en la cabecera
      const numProductos = carrito.reduce(function(total, item) {
        return total + item.cantidad;
      }, 0);
      
      document.getElementById("items-count").textContent = 
        numProductos === 0 ? "0 productos" :
        numProductos === 1 ? "1 producto" :
        numProductos + " productos";

      // Si el carrito está vacío, mostrar mensaje
      if (carrito.length === 0) {
        contenedor.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <h2>Tu carrito está vacío</h2>
            <p>Añade productos desde el catálogo para empezar tu compra</p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:1rem">
              Ir al catálogo
            </a>
          </div>
        `;
        return;
      }

      // Si hay productos, generar la lista
      const itemsHTML = carrito.map(function(item, index) {
        // Calcular precio total de esta línea (precio × cantidad)
        const precioLinea = item.precio * item.cantidad;

        return `
          <div class="cart-item">
            <!-- Imagen -->
            <div class="cart-item-img">
              ${item.imagen 
                ? `<img src="${item.imagen}" alt="${item.nombre}">`
                : `👕`
              }
            </div>

            <!-- Información -->
            <div class="cart-item-info">
              <p class="cart-item-sport">${item.deporte}</p>
              <h3 class="cart-item-name">${item.nombre}</h3>
              <p class="cart-item-talla">Talla: <strong>${item.talla}</strong></p>
              <p class="cart-item-price">${formatearPrecio(precioLinea)}</p>
            </div>

            <!-- Controles -->
            <div class="cart-item-controls">
              <!-- Control de cantidad -->
              <div class="quantity-control">
                <button 
                  class="quantity-btn" 
                  onclick="cambiarCantidad(${index}, -1)"
                  ${item.cantidad <= 1 ? 'disabled' : ''}
                >
                  −
                </button>
                <span class="quantity-value">${item.cantidad}</span>
                <button 
                  class="quantity-btn" 
                  onclick="cambiarCantidad(${index}, 1)"
                >
                  +
                </button>
              </div>

              <!-- Botón eliminar -->
              <button class="btn-remove" onclick="eliminarProducto(${index})">
                🗑 Eliminar
              </button>
            </div>
          </div>
        `;
      }).join("");

      // Calcular totales
      const subtotal = carrito.reduce(function(total, item) {
        return total + (item.precio * item.cantidad);
      }, 0);

      // Envío gratis si el subtotal es >= 50€, si no cuesta 4.99€
      const gastoEnvio = subtotal >= 50 ? 0 : 4.99;
      const total = subtotal + gastoEnvio;

      // Generar HTML completo
      contenedor.innerHTML = `
        <!-- Lista de productos -->
        <div class="cart-items">
          ${itemsHTML}
        </div>

        <!-- Resumen del pedido -->
        <div class="cart-summary">
          <h2 class="summary-title">Resumen</h2>

          <div class="summary-line">
            <span>Subtotal</span>
            <span>${formatearPrecio(subtotal)}</span>
          </div>

          <div class="summary-line">
            <span>Envío</span>
            <span>${gastoEnvio === 0 ? 'Gratis' : formatearPrecio(gastoEnvio)}</span>
          </div>

          ${subtotal < 50 && subtotal > 0 ? `
            <p style="font-size:0.78rem;color:var(--muted);margin:-0.5rem 0 0;">
              Añade ${formatearPrecio(50 - subtotal)} más para envío gratis
            </p>
          ` : ''}

          <div class="summary-total">
            <span class="summary-total-label">Total</span>
            <span class="summary-total-price">${formatearPrecio(total)}</span>
          </div>

          <button class="btn btn-primary btn-checkout" onclick="finalizarCompra()">
            Finalizar compra
          </button>

          <p class="summary-note">
            Los precios incluyen IVA. El pedido se procesará de forma segura.
          </p>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: cambiarCantidad
    // Suma o resta 1 unidad a un producto del carrito
    //   - index: posición del producto en el array carrito
    //   - delta: +1 para aumentar, -1 para disminuir
    // ─────────────────────────────────────────────
    function cambiarCantidad(index, delta) {
      // Sumar o restar la cantidad
      carrito[index].cantidad += delta;

      // Si la cantidad llega a 0, eliminar el producto
      if (carrito[index].cantidad <= 0) {
        carrito.splice(index, 1); // splice elimina 1 elemento en la posición index
      }

      // Guardar cambios y redibujar
      guardarCarrito();
      renderizarCarrito();
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: eliminarProducto
    // Elimina un producto completo del carrito
    //   - index: posición del producto en el array
    // ─────────────────────────────────────────────
    function eliminarProducto(index) {
      // Confirmar antes de eliminar
      const producto = carrito[index];
      const confirmar = confirm(`¿Eliminar ${producto.nombre} (${producto.talla}) del carrito?`);
      
      if (confirmar) {
        // splice elimina 1 elemento en la posición index
        carrito.splice(index, 1);
        
        // Guardar y redibujar
        guardarCarrito();
        renderizarCarrito();
      }
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: finalizarCompra
    // Procesa el pedido (por ahora solo simula el éxito)
    // ─────────────────────────────────────────────
    function finalizarCompra() {
      // En modo mock, simplemente mostramos un mensaje de éxito
      // Cuando tengáis el backend conectado, aquí haríais un fetch a la API
      
      if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
      }

      // Simulamos el proceso de compra
      const confirmar = confirm("¿Confirmar pedido? (Esto es una simulación)");
      
      if (confirmar) {
        // Vaciar el carrito
        carrito = [];
        guardarCarrito();
        
        // Mostrar mensaje de éxito
        const contenedor = document.getElementById("cart-content");
        contenedor.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">✅</div>
            <h2>¡Pedido realizado con éxito!</h2>
            <p>Recibirás un email de confirmación en breve.</p>
            <p style="color:var(--muted);font-size:0.85rem;margin-top:1rem;">
              Número de pedido: #SP${Date.now()}
            </p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:2rem">
              Seguir comprando
            </a>
          </div>
        `;

        // Actualizar contador header
        document.getElementById("items-count").textContent = "0 productos";
      }
    }

  </script>
</body>
</html>
