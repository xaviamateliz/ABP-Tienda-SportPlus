<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Producto — Sport Plus</title>
  <!-- Cargamos los estilos globales del proyecto -->
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    body { padding-top: 72px; }

    /* ——— CONTENEDOR PRINCIPAL ——— */
    /* Dos columnas: imagen a la izquierda, info a la derecha */
    .product-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      padding: 4rem 0 6rem;
      align-items: start;
    }

    /* ——— COLUMNA IMAGEN ——— */
    .product-gallery {
      position: sticky;  /* La imagen se queda fija mientras haces scroll */
      top: 90px;
    }

    .product-main-img {
      width: 100%;
      aspect-ratio: 3 / 4;           /* Proporción fija de la imagen */
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8rem;
      position: relative;
    }

    .product-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    /* Badge (etiqueta: "Nuevo", "-20%", etc.) */
    .product-main-badge {
      position: absolute;
      top: 1.2rem;
      left: 1.2rem;
      background: var(--accent);
      color: var(--white);
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.8rem;
      border-radius: var(--radius-sm);
    }

    /* ——— COLUMNA INFO ——— */
    .product-info { display: flex; flex-direction: column; gap: 1.5rem; }

    /* Migas de pan: "Catálogo > Fútbol > Camisetas" */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .breadcrumb a { color: var(--muted); transition: color var(--transition); }
    .breadcrumb a:hover { color: var(--white); }
    .breadcrumb span { color: var(--muted-2); }

    /* Deporte (etiqueta roja pequeña encima del nombre) */
    .product-deporte {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Nombre del producto */
    .product-nombre {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1;
      color: var(--white);
    }

    /* Precio grande */
    .product-precio {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--white);
    }

    /* Separador horizontal */
    .product-divider {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ——— SELECTOR DE TALLA ——— */
    .talla-label {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    .tallas-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* Cada botón de talla */
    .talla-btn {
      min-width: 48px;
      height: 48px;
      padding: 0 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-display);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .talla-btn:hover {
      border-color: var(--white);
      color: var(--white);
    }

    /* Cuando el usuario hace clic en una talla, se añade la clase "selected" */
    .talla-btn.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
    }

    /* ——— BOTONES DE ACCIÓN ——— */
    .product-actions {
      display: flex;
      gap: 1rem;
    }

    /* Botón principal "Añadir al carrito" (ocupa la mayor parte del espacio) */
    .btn-add-cart {
      flex: 1;
      justify-content: center;
      font-size: 1.1rem;
      padding: 1rem 2rem;
    }

    /* Botón secundario de favoritos (corazón) */
    .btn-fav {
      width: 54px;
      height: 54px;
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
    }

    .btn-fav:hover { border-color: #ff4466; color: #ff4466; }
    .btn-fav.active { background: rgba(255,68,102,0.1); border-color: #ff4466; color: #ff4466; }

    /* Mensaje de error cuando no han elegido talla */
    .talla-aviso {
      font-size: 0.82rem;
      color: var(--accent);
      display: none;   /* Oculto por defecto, se muestra con JS */
    }

    /* ——— DESCRIPCIÓN / DETALLES ——— */
    .product-desc {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.8;
    }

    /* Lista de características (icono + texto) */
    .product-features {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .feature-icon {
      width: 28px;
      height: 28px;
      background: var(--surface-2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* Indicador de stock */
    .stock-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
    }

    .stock-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stock-ok   { background: #44ff88; }
    .stock-poco { background: #ffbb33; }
    .stock-no   { background: var(--accent); }

    /* ——— ESTADO DE CARGA Y ERROR ——— */
    /* Se muestra mientras se busca el producto */
    .page-state {
      min-height: 60vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--muted);
      text-align: center;
    }

    .page-state span { font-size: 4rem; }

    .page-state p {
      font-family: var(--font-display);
      font-size: 1.5rem;
      text-transform: uppercase;
    }

    /* ——— RESPONSIVE (móvil) ——— */
    @media (max-width: 900px) {
      .product-layout {
        grid-template-columns: 1fr;   /* En móvil pasan a una sola columna */
        gap: 2rem;
        padding: 2rem 0 4rem;
      }

      .product-gallery { position: static; }  /* Ya no se queda fija */
    }
  </style>
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">Sport<span>+</span></a>
    <ul class="navbar-links">
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="catalogo.html?deporte=futbol">Fútbol</a></li>
      <li><a href="catalogo.html?deporte=running">Running</a></li>
      <li><a href="catalogo.html?deporte=gym">Gym</a></li>
      <li><a href="catalogo.html?deporte=baloncesto">Baloncesto</a></li>
    </ul>
    <div class="navbar-actions">
      <div id="nav-user"></div>
      <a href="carrito.html" class="navbar-icon-btn">
        🛒 <span>Carrito</span>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <!-- ============ CONTENIDO PRINCIPAL ============ -->
  <!-- Este div se rellena dinámicamente con JavaScript -->
  <div class="container" id="contenido-producto">

    <!-- Estado de carga inicial -->
    <div class="page-state">
      <span>⏳</span>
      <p>Cargando producto...</p>
    </div>

  </div>

  <!-- ============ FOOTER ============ -->
  <footer style="margin-top: 4rem;">
    <div class="container">
      <div class="footer-inner">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;text-transform:uppercase;">
          Sport<span style="color:var(--accent)">+</span>
        </span>
        <p>© 2026 Sport Plus · Proyecto ABP 1DAM/1DAW</p>
      </div>
    </div>
  </footer>

  <!-- ============ SCRIPTS ============ -->
  <!-- Importante: el orden importa. config.js primero, luego utils.js, luego productos.js -->
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/productos.js"></script>

  <script>
    // ─────────────────────────────────────────────
    // VARIABLE GLOBAL: talla que ha seleccionado el usuario
    // Empieza vacía y se rellena cuando hace clic en una talla
    // ─────────────────────────────────────────────
    let tallaSeleccionada = "";

    // ─────────────────────────────────────────────
    // AL CARGAR LA PÁGINA ejecutamos la función principal
    // "DOMContentLoaded" significa: "espera a que el HTML esté listo"
    // ─────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", async function() {

      // Iniciamos la navbar (muestra "Entrar" o "Mi cuenta" según si hay sesión)
      iniciarNavbar();

      // Leemos el parámetro "id" de la URL
      // Ejemplo: si la URL es "producto.html?id=3", obtenemos "3"
      const id = getParam("id");

      // Si no hay id en la URL, mostramos error y paramos
      if (!id) {
        mostrarEstadoError("No se ha especificado ningún producto.");
        return;
      }

      // Buscamos el producto usando la función de productos.js
      // "await" espera a que termine la búsqueda antes de continuar
      const producto = await fetchProductoPorId(id);

      // Si no existe el producto (la función devuelve null), mostramos error
      if (!producto) {
        mostrarEstadoError("Producto no encontrado.");
        return;
      }

      // Si todo va bien, pintamos la página con los datos del producto
      renderizarPagina(producto);
    });

    // ─────────────────────────────────────────────
    // FUNCIÓN: renderizarPagina
    // Recibe el objeto producto y construye todo el HTML de la página
    // ─────────────────────────────────────────────
    function renderizarPagina(producto) {

      // Cambiamos el título de la pestaña del navegador
      document.title = producto.nombre + " — Sport Plus";

      // Generamos el HTML de las tallas como botones individuales
      // producto.tallas es un array: ["S", "M", "L", "XL"]
      // .map() convierte cada talla en un botón HTML
      const tallasHTML = producto.tallas.map(function(talla) {
        return `<button class="talla-btn" onclick="seleccionarTalla(this, '${talla}')">${talla}</button>`;
      }).join(""); // .join("") une todos los botones en un solo string

      // Calculamos el color y texto del indicador de stock
      let stockClase = "stock-ok";
      let stockTexto = "En stock";

      if (producto.stock === 0) {
        stockClase = "stock-no";
        stockTexto = "Sin stock";
      } else if (producto.stock <= 5) {
        stockClase = "stock-poco";
        stockTexto = "Pocas unidades (" + producto.stock + " disponibles)";
      } else {
        stockTexto = "En stock (" + producto.stock + " disponibles)";
      }

      // Construimos el HTML completo de la página y lo metemos en el contenedor
      // "innerHTML" reemplaza todo el contenido del div #contenido-producto
      document.getElementById("contenido-producto").innerHTML = `

        <div class="product-layout">

          <!-- ——— COLUMNA IZQUIERDA: Imagen ——— -->
          <div class="product-gallery">
            <div class="product-main-img">

              ${producto.imagen
                ? `<img src="${producto.imagen}" alt="${producto.nombre}">`
                : `👕`
              }

              ${producto.badge
                ? `<span class="product-main-badge">${producto.badge}</span>`
                : ""
              }

            </div>
          </div>

          <!-- ——— COLUMNA DERECHA: Información ——— -->
          <div class="product-info">

            <!-- Migas de pan: enlaces para volver atrás -->
            <nav class="breadcrumb">
              <a href="../index.html">Inicio</a>
              <span>/</span>
              <a href="catalogo.html">Catálogo</a>
              <span>/</span>
              <a href="catalogo.html?deporte=${producto.deporte}">${producto.deporte}</a>
              <span>/</span>
              <span style="color: var(--muted)">${producto.nombre}</span>
            </nav>

            <!-- Deporte y nombre -->
            <div>
              <p class="product-deporte">${producto.deporte}</p>
              <h1 class="product-nombre">${producto.nombre}</h1>
            </div>

            <!-- Precio -->
            <p class="product-precio">${formatearPrecio(producto.precio)}</p>

            <hr class="product-divider">

            <!-- Selector de talla -->
            <div>
              <span class="talla-label">Elige tu talla</span>
              <div class="tallas-grid" id="tallas-grid">
                ${tallasHTML}
              </div>
              <!-- Este mensaje se muestra si el usuario intenta añadir sin talla -->
              <p class="talla-aviso" id="talla-aviso">⚠ Por favor, selecciona una talla</p>
            </div>

            <!-- Botones: añadir al carrito y favoritos -->
            <div class="product-actions">
              <button
                class="btn btn-primary btn-add-cart"
                id="btn-carrito"
                onclick="handleAgregarCarrito(${producto.id})"
              >
                + Añadir al carrito
              </button>

              <!-- Botón de favoritos (solo visual por ahora) -->
              <button class="btn-fav" id="btn-fav" onclick="toggleFavorito(this)" title="Añadir a favoritos">
                🤍
              </button>
            </div>

            <!-- Estado del stock -->
            <div class="stock-info">
              <span class="stock-dot ${stockClase}"></span>
              <span style="color: var(--muted); font-size: 0.82rem;">${stockTexto}</span>
            </div>

            <hr class="product-divider">

            <!-- Descripción larga -->
            <p class="product-desc">${producto.descripcion}</p>

            <!-- Lista de características fijas -->
            <div class="product-features">
              <div class="feature-item">
                <div class="feature-icon">🚚</div>
                <span>Envío gratis en pedidos +50€ · Entrega en 24–48h</span>
              </div>
              <div class="feature-item">
                <div class="feature-icon">↩️</div>
                <span>Devolución gratuita en 30 días</span>
              </div>
              <div class="feature-item">
                <div class="feature-icon">✅</div>
                <span>Producto oficial Sport Plus · Temporada 2025/2026</span>
              </div>
            </div>

          </div>
        </div>
      `;
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: seleccionarTalla
    // Se llama cuando el usuario hace clic en un botón de talla
    //   - btn: el botón que se ha pulsado (lo pasa "this" desde el onclick)
    //   - talla: el texto de la talla, ej: "M"
    // ─────────────────────────────────────────────
    function seleccionarTalla(btn, talla) {
      // Quitamos la clase "selected" a todos los botones de talla
      const todosBotones = document.querySelectorAll(".talla-btn");
      todosBotones.forEach(function(b) {
        b.classList.remove("selected");
      });

      // Añadimos "selected" solo al botón que se ha pulsado
      btn.classList.add("selected");

      // Guardamos la talla elegida en la variable global
      tallaSeleccionada = talla;

      // Ocultamos el aviso de "selecciona una talla" si estaba visible
      document.getElementById("talla-aviso").style.display = "none";
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: handleAgregarCarrito
    // Se llama al pulsar "Añadir al carrito"
    // Valida que haya talla elegida antes de añadir
    // ─────────────────────────────────────────────
    function handleAgregarCarrito(idProducto) {
      // Si no han seleccionado talla, mostramos el aviso y paramos
      if (tallaSeleccionada === "") {
        document.getElementById("talla-aviso").style.display = "block";
        return; // "return" detiene la función aquí, no continúa
      }

      // Buscamos el producto en el mock data
      const producto = MOCK_PRODUCTOS.find(function(p) {
        return p.id === idProducto;
      });

      if (!producto) return;

      // Leemos el carrito actual del localStorage (o array vacío si no hay nada)
      // JSON.parse convierte el texto guardado en localStorage a un array de JS
      let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

      // Buscamos si este producto con esta talla ya está en el carrito
      const existente = carrito.find(function(item) {
        return item.id === idProducto && item.talla === tallaSeleccionada;
      });

      if (existente) {
        // Si ya existe, solo sumamos 1 a la cantidad
        existente.cantidad += 1;
      } else {
        // Si no existe, lo añadimos como nuevo elemento
        // El operador "..." (spread) copia todas las propiedades del producto
        carrito.push({
          ...producto,
          talla: tallaSeleccionada,
          cantidad: 1
        });
      }

      // Guardamos el carrito actualizado en localStorage
      // JSON.stringify convierte el array de JS a texto para poder guardarlo
      localStorage.setItem("carrito", JSON.stringify(carrito));

      // Actualizamos el contador del carrito en la navbar
      actualizarContadorCarrito();

      // Feedback visual: cambiamos el botón para confirmar que se añadió
      const btn = document.getElementById("btn-carrito");
      btn.textContent = "✓ Añadido al carrito";
      btn.style.background = "#44ff88";
      btn.style.color = "#000";

      // Después de 2 segundos, volvemos el botón a su estado original
      setTimeout(function() {
        btn.textContent = "+ Añadir al carrito";
        btn.style.background = "";
        btn.style.color = "";
      }, 2000);
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: toggleFavorito
    // Alterna el botón de corazón entre activo y no activo
    // (Solo visual por ahora, sin guardar en base de datos)
    // ─────────────────────────────────────────────
    function toggleFavorito(btn) {
      // classList.toggle añade la clase si no la tiene, o la quita si ya la tiene
      btn.classList.toggle("active");

      if (btn.classList.contains("active")) {
        btn.textContent = "❤️";
        btn.title = "Quitar de favoritos";
      } else {
        btn.textContent = "🤍";
        btn.title = "Añadir a favoritos";
      }
    }

    // ─────────────────────────────────────────────
    // FUNCIÓN: mostrarEstadoError
    // Muestra un mensaje cuando no se encuentra el producto
    // ─────────────────────────────────────────────
    function mostrarEstadoError(mensaje) {
      document.getElementById("contenido-producto").innerHTML = `
        <div class="page-state">
          <span>😕</span>
          <p>${mensaje}</p>
          <a href="catalogo.html" class="btn btn-outline" style="margin-top:1rem">
            Volver al catálogo
          </a>
        </div>
      `;
    }

  </script>

  <script>
</script>
</body>
</html>
