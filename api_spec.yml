openapi: 3.0.0
info:
  title: API Tienda de Camisetas - ABP
  version: 1.0.0
  description: Especificación completa de rutas para el MVP de la tienda de camisetas.
paths:
  /api/auth/login:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión de usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Autenticación exitosa y retorno de sesión/token
        '401':
          description: Credenciales incorrectas

  /api/usuarios:
    get:
      tags:
        - Usuarios
      summary: Obtener lista completa de usuarios
      responses:
        '200':
          description: Lista de usuarios recuperada
    post:
      tags:
        - Autenticación
      summary: Registrar un nuevo usuario del sistema
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
                nombre:
                  type: string
                apellido:
                  type: string
                dni:
                  type: string
                direccion:
                  type: string
                telefono:
                  type: string
                poblacion:
                  type: string
                provincia:
                  type: string
                codigo_postal:
                  type: integer
                rol_id:
                  type: integer
      responses:
        '201':
          description: Usuario registrado correctamente
        '400':
          description: Error en la validación de los datos entregados

  /api/usuarios/{id}:
    get:
      tags:
        - Usuarios
      summary: Obtener los detalles de un usuario por su ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Datos del usuario encontrados
        '404':
          description: El usuario solicitado no existe

  /api/productos:
    get:
      tags:
        - Productos
      summary: Listar todo el catálogo de productos
      responses:
        '200':
          description: Lista de productos obtenida
    post:
      tags:
        - Productos
      summary: Crear un nuevo producto en el catálogo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                descripcion:
                  type: string
                precio:
                  type: number
                stock:
                  type: integer
                categoria_id:
                  type: integer
      responses:
        '201':
          description: Producto añadido con éxito
        '400':
          description: Parámetros obligatorios faltantes

  /api/productos/{id}:
    get:
      tags:
        - Productos
      summary: Obtener la información de una camiseta específica
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Producto encontrado
        '404':
          description: Producto no encontrado
    put:
      tags:
        - Productos
      summary: Actualizar la información o stock de un producto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                descripcion:
                  type: string
                precio:
                  type: number
                stock:
                  type: integer
                categoria_id:
                  type: integer
      responses:
        '200':
          description: Producto actualizado correctamente
        '404':
          description: El producto a modificar no existe
    delete:
      tags:
        - Productos
      summary: Eliminar un producto del sistema
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Producto eliminado con éxito
        '404':
          description: El producto no existe

  /api/categorias:
    get:
      tags:
        - Categorías
      summary: Listar todas las categorías disponibles
      responses:
        '200':
          description: Lista de categorías devuelta
    post:
      tags:
        - Categorías
      summary: Crear una nueva categoría para la tienda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
      responses:
        '201':
          description: Categoría creada con éxito

  /api/pedidos:
    get:
      tags:
        - Pedidos
      summary: Obtener el histórico de todos los pedidos realizados
      responses:
        '200':
          description: Lista de pedidos devuelta
    post:
      tags:
        - Pedidos
      summary: Tramitar un nuevo pedido con múltiples productos vinculados
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                usuario_id:
                  type: integer
                direccion_envio:
                  type: string
                poblacion_envio:
                  type: string
                provincia_envio:
                  type: string
                codigo_postal_envio:
                  type: string
                lineas:
                  type: array
                  items:
                    type: object
                    properties:
                      producto_id:
                        type: integer
                      cantidad:
                        type: integer
                      precio_unitario:
                        type: number
      responses:
        '201':
          description: Pedido y líneas de pedido creados correctamente
        '400':
          description: Error de stock o datos de envío erróneos

  /api/pedidos/{id}:
    get:
      tags:
        - Pedidos
      summary: Consultar los detalles de un pedido y sus respectivas líneas
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Información del pedido y sus productos asociada
        '404':
          description: El pedido consultado no existe
          