<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito — Sport Plus</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    body { padding-top: 72px; background: var(--bg); }

    /* ——— CABECERA ——— */
    .cart-header {
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
    }

    .cart-header h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      margin-bottom: 0.5rem;
    }

    .cart-header p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ——— LAYOUT PRINCIPAL ——— */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2.5rem;
      padding: 3rem 0 5rem;
      align-items: start;
    }

    /* ——— LISTA DE PRODUCTOS ——— */
    .cart-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cart-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: 1.5rem;
      align-items: center;
      transition: border-color var(--transition);
    }

    .cart-item:hover { border-color: var(--border-light); }

    .cart-item-img {
      width: 100px;
      height: 120px;
      background: var(--surface-2);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .cart-item-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cart-item-info {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .cart-item-sport {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .cart-item-name {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 0.2rem;
    }

    .cart-item-talla {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .cart-item-talla strong {
      color: var(--text);
      font-weight: 600;
    }

    .cart-item-price {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--white);
      margin-top: 0.5rem;
    }

    .cart-item-controls {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface-2);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 0.3rem;
    }

    .quantity-btn {
      width: 32px;
      height: 32px;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: all var(--transition);
    }

    .quantity-btn:hover {
      background: var(--surface);
      color: var(--white);
    }

    .quantity-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .quantity-value {
      min-width: 32px;
      text-align: center;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--white);
    }

    .btn-remove {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--muted);
      font-size: 0.75rem;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-remove:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ——— RESUMEN / CHECKOUT ——— */
    .cart-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      position: sticky;
      top: 90px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .summary-title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--white);
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .summary-line span:last-child {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--text);
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }

    .summary-total-label {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--white);
    }

    .summary-total-price {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--white);
    }

    .btn-checkout {
      width: 100%;
      justify-content: center;
      padding: 1rem;
      font-size: 1rem;
    }

    .summary-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    /* ——— CARRITO VACÍO ——— */
    .cart-empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1.5rem;
      text-align: center;
    }

    .cart-empty-icon {
      font-size: 5rem;
      opacity: 0.5;
    }

    .cart-empty h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      margin-bottom: 0.5rem;
    }

    .cart-empty p {
      color: var(--muted);
      font-size: 0.95rem;
      max-width: 400px;
    }

    /* ——— RESPONSIVE ——— */
    @media (max-width: 1000px) {
      .cart-layout {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }

      .cart-item {
        grid-template-columns: 80px 1fr;
        gap: 1rem;
      }

      .cart-item-controls {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
    }
  </style>
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <nav class="navbar">
    <a href="../index.html" class="navbar-logo">Sport<span>+</span></a>
    <ul class="navbar-links">
      <li><a href="catalogo.html">Catálogo</a></li>
      <li><a href="catalogo.html?deporte=futbol">Fútbol</a></li>
      <li><a href="catalogo.html?deporte=running">Running</a></li>
      <li><a href="catalogo.html?deporte=gym">Gym</a></li>
      <li><a href="catalogo.html?deporte=baloncesto">Baloncesto</a></li>
    </ul>
    <div class="navbar-actions">
      <div id="nav-user"></div>
      <a href="carrito.html" class="navbar-icon-btn">
        🛒 <span>Carrito</span>
        <span class="cart-badge" id="cart-count">0</span>
      </a>
    </div>
  </nav>

  <!-- ============ CABECERA ============ -->
  <div class="cart-header">
    <div class="container">
      <h1>Carrito</h1>
      <p id="items-count">0 productos</p>
    </div>
  </div>

  <!-- ============ CONTENIDO PRINCIPAL ============ -->
  <div class="container">
    <div class="cart-layout" id="cart-content">
    </div>
  </div>

  <!-- ============ FOOTER ============ -->
  <footer>
    <div class="container">
      <div class="footer-inner">
        <span style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.4rem;text-transform:uppercase;">
          Sport<span style="color:var(--accent)">+</span>
        </span>
        <p>© 2026 Sport Plus · Proyecto ABP 1DAM/1DAW</p>
      </div>
    </div>
  </footer>

  <!-- ============ SCRIPTS ============ -->
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/productos.js"></script>

  <script>
    let carrito = [];

    document.addEventListener("DOMContentLoaded", function() {
      if (typeof iniciarNavbar === "function") iniciarNavbar();
      cargarCarrito();
      renderizarCarrito();
    });

    function cargarCarrito() {
      const carritoGuardado = localStorage.getItem("carrito");
      carrito = carritoGuardado ? JSON.parse(carritoGuardado) : [];
    }

    function guardarCarrito() {
      localStorage.setItem("carrito", JSON.stringify(carrito));
      actualizarContadorCarrito();
    }

    function renderizarCarrito() {
      const contenedor = document.getElementById("cart-content");

      const numProductos = carrito.reduce(function(total, item) {
        return total + item.cantidad;
      }, 0);

      document.getElementById("items-count").textContent =
        numProductos === 0 ? "0 productos" :
        numProductos === 1 ? "1 producto" :
        numProductos + " productos";

      if (carrito.length === 0) {
        contenedor.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">🛒</div>
            <h2>Tu carrito está vacío</h2>
            <p>Añade productos desde el catálogo para empezar tu compra</p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:1rem">
              Ir al catálogo
            </a>
          </div>
        `;
        return;
      }

      const itemsHTML = carrito.map(function(item, index) {
        const precioLinea = item.precio * item.cantidad;

        // FIX: usar url_producto || imagen para la imagen
        const urlImagen = item.url_producto || item.imagen || "";

        // FIX: usar categoria.nombre || deporte para la categoría
        const categoria = (item.categoria && item.categoria.nombre)
          ? item.categoria.nombre
          : (item.deporte || "");

        return `
          <div class="cart-item">
            <!-- Imagen -->
            <div class="cart-item-img">
              ${urlImagen
                ? `<img src="${urlImagen}" alt="${item.nombre}" onerror="this.onerror=null;this.parentElement.innerHTML='👕'">`
                : `👕`
              }
            </div>

            <!-- Información -->
            <div class="cart-item-info">
              <p class="cart-item-sport">${categoria}</p>
              <h3 class="cart-item-name">${item.nombre}</h3>
              <p class="cart-item-talla">Talla: <strong>${item.talla || item.tallaSeleccionada || '-'}</strong></p>
              <p class="cart-item-price">${formatearPrecio(precioLinea)}</p>
            </div>

            <!-- Controles -->
            <div class="cart-item-controls">
              <div class="quantity-control">
                <button
                  class="quantity-btn"
                  onclick="cambiarCantidad(${index}, -1)"
                  ${item.cantidad <= 1 ? "disabled" : ""}
                >
                  −
                </button>
                <span class="quantity-value">${item.cantidad}</span>
                <button
                  class="quantity-btn"
                  onclick="cambiarCantidad(${index}, 1)"
                >
                  +
                </button>
              </div>
              <button class="btn-remove" onclick="eliminarProducto(${index})">
                🗑 Eliminar
              </button>
            </div>
          </div>
        `;
      }).join("");

      const subtotal = carrito.reduce(function(total, item) {
        return total + (item.precio * item.cantidad);
      }, 0);

      const gastoEnvio = subtotal >= 50 ? 0 : 4.99;
      const total = subtotal + gastoEnvio;

      contenedor.innerHTML = `
        <div class="cart-items">
          ${itemsHTML}
        </div>

        <div class="cart-summary">
          <h2 class="summary-title">Resumen</h2>

          <div class="summary-line">
            <span>Subtotal</span>
            <span>${formatearPrecio(subtotal)}</span>
          </div>

          <div class="summary-line">
            <span>Envío</span>
            <span>${gastoEnvio === 0 ? "Gratis" : formatearPrecio(gastoEnvio)}</span>
          </div>

          ${subtotal < 50 && subtotal > 0 ? `
            <p style="font-size:0.78rem;color:var(--muted);margin:-0.5rem 0 0;">
              Añade ${formatearPrecio(50 - subtotal)} más para envío gratis
            </p>
          ` : ""}

          <div class="summary-total">
            <span class="summary-total-label">Total</span>
            <span class="summary-total-price">${formatearPrecio(total)}</span>
          </div>

          <button class="btn btn-primary btn-checkout" onclick="finalizarCompra()">
            Finalizar compra
          </button>

          <p class="summary-note">
            Los precios incluyen IVA. El pedido se procesará de forma segura.
          </p>
        </div>
      `;
    }

    function cambiarCantidad(index, delta) {
      carrito[index].cantidad += delta;
      if (carrito[index].cantidad <= 0) {
        carrito.splice(index, 1);
      }
      guardarCarrito();
      renderizarCarrito();
    }

    function eliminarProducto(index) {
      const producto = carrito[index];
      const talla = producto.talla || producto.tallaSeleccionada || "-";
      const confirmar = confirm(`¿Eliminar ${producto.nombre} (${talla}) del carrito?`);
      if (confirmar) {
        carrito.splice(index, 1);
        guardarCarrito();
        renderizarCarrito();
      }
    }

    function finalizarCompra() {
      if (carrito.length === 0) {
        alert("El carrito está vacío");
        return;
      }

      const confirmar = confirm("¿Confirmar pedido? (Esto es una simulación)");

      if (confirmar) {
        carrito = [];
        guardarCarrito();

        const contenedor = document.getElementById("cart-content");
        contenedor.innerHTML = `
          <div class="cart-empty">
            <div class="cart-empty-icon">✅</div>
            <h2>¡Pedido realizado con éxito!</h2>
            <p>Recibirás un email de confirmación en breve.</p>
            <p style="color:var(--muted);font-size:0.85rem;margin-top:1rem;">
              Número de pedido: #SP${Date.now()}
            </p>
            <a href="catalogo.html" class="btn btn-primary" style="margin-top:2rem">
              Seguir comprando
            </a>
          </div>
        `;

        document.getElementById("items-count").textContent = "0 productos";
      }
    }

  </script>
</body>
</html>
